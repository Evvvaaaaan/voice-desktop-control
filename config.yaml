stt:
  provider: macos # macos | whisper_api | whisper_local
  whisper_api_key: ""
  whisper_local_model: base

llm:
  provider: ollama # ollama | claude | openai | nvidia
  claude_api_key: ""
  claude_model: claude-sonnet-4-6
  openai_api_key: ""
  openai_model: gpt-4o
  ollama_url: http://localhost:11434
  ollama_model: llama3
  nvidia_api_key: ""
  nvidia_model: minimaxai/minimax-m3

activation:
  wake_word: false
  wake_phrase: "hey desk"
  hotkey: true
  hotkey_binding: "alt+space"

tts:
  provider: macos # macos | nvidia
  voice: Yuna
  rate: 200
  nvidia_api_key: ""
  nvidia_function_id: "877104f7-e885-42b9-8de8-f6e4c6303969"
  nvidia_voice: Chatterbox-Multilingual.ko-KR.Male
  nvidia_language_code: ko-KR

safety:
  require_confirmation: true

memory:
  enabled: true
  embedding_provider: auto # auto | openai | nvidia | ollama | off
  openai_embedding_model: text-embedding-3-small
  nvidia_embedding_model: nvidia/nv-embedqa-e5-v5
  ollama_embedding_model: nomic-embed-text
  retrieval_top_k: 3

suggestion:
  enabled: true
  check_interval_sec: 300 # lower to 30 to try suggestions quickly
  startup_grace_sec: 300  # lower to 10 to try suggestions quickly
  min_pattern_days: 3     # distinct days in the same hour to count as a habit
  cooldown_min: 60        # at most 1 suggestion per hour
  recent_run_suppress_min: 60
